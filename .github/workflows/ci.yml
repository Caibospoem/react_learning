name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - feature/**

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: game_admin_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: game_admin_backend/requirements-dev.txt

      - name: Install Dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run Pytest
        run: python -m pytest -q

  frontend:
    name: Frontend Lint Test Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: game-admin-demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: game-admin-demo/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm lint

      - name: Run Vitest
        run: pnpm test

      - name: Run Build
        run: pnpm build

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose File
        run: docker compose config

      - name: Build Backend Image
        run: docker build -t re-backend-ci ./game_admin_backend

      - name: Build Frontend Image
        run: docker build -t re-frontend-ci ./game-admin-demo
